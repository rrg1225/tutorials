name: Fork Health

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "rrg1225_fork_health.py"
      - ".github/workflows/rrg1225-fork-health.yml"
  pull_request:
    branches: [main]
    paths:
      - "rrg1225_fork_health.py"
      - ".github/workflows/rrg1225-fork-health.yml"

jobs:
  health:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python rrg1225_fork_health.py
